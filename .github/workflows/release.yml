name: Release

# Cuts a GitHub release with a Foundry-ready module zip whenever a version
# tag (vX.Y.Z) is pushed. The zip contains module.json at its root so Foundry's
# "Update Module" flow extracts it cleanly into Data/modules/enhance-ui/.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches module.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER="$(jq -r '.version' module.json)"
          if [ "$TAG" != "$VER" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match module.json version $VER"
            exit 1
          fi

      - name: Build module zip
        run: zip -r enhance-ui.zip module.json scripts styles README.md

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" enhance-ui.zip \
            --title "$GITHUB_REF_NAME" \
            --notes "Automated release $GITHUB_REF_NAME."
